# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write  # 👈 改为 write，以便更新文件
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 👈 需要完整的 Git 历史来获取修改时间

      # 👇 仅更新本次提交中被修改文章的 last_modified_at
      - name: Update last_modified_at for changed posts
        run: |
          echo "🔍 Checking for changed posts..."

          PREV_SHA="${{ github.event.before }}"
          if [ "$PREV_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$PREV_SHA" ]; then
            # 首次提交或手动触发：检查所有 _posts 文件
            echo "First commit or manual trigger, scanning all posts..."
            changed_files=$(find _posts/ \( -name "*.md" -o -name "*.markdown" \) -type f 2>/dev/null || true)
          else
            # 正常推送：只处理本次修改的文件
            echo "Checking posts modified between $PREV_SHA and ${{ github.sha }}..."
            changed_files=$(git diff --name-only --diff-filter=M "$PREV_SHA" "${{ github.sha }}" -- _posts/ || true)
          fi

          if [ -z "$changed_files" ]; then
            echo "✅ No posts to update."
            exit 0
          fi

          echo "📝 Changed posts:"
          echo "$changed_files"

          echo "$changed_files" | while IFS= read -r file; do
            if [ -f "$file" ]; then
              lastmod=$(git log -1 --format="%ci" -- "$file")
              if [ -n "$lastmod" ]; then
                echo "  → $file"
                if grep -q "^last_modified_at:" "$file"; then
                  sed -i "s/^last_modified_at:.*/last_modified_at: $lastmod/" "$file"
                  echo "    ✓ Updated: $lastmod"
                else
                  sed -i "/^date:/a last_modified_at: $lastmod" "$file"
                  echo "    ✓ Added: $lastmod"
                fi
              fi
            fi
          done

          echo "✅ All done!"

      # 👇 提交已更新的 last_modified_at
      - name: Commit updated last_modified_at (if changed)
        run: |
          if [[ -n $(git status _posts/ -s) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _posts/
            if git commit -m "chore: auto-update last_modified_at [skip ci]"; then
              echo "✅ Committed changes, pushing..."
              git push origin main
            else
              echo "No changes to commit"
            fi
          else
            echo "No changes to last_modified_at"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # Not needed with a .ruby-version file
          bundler: 'Gemfile.lock' # 使用 Gemfile.lock 中指定的 Bundler 版本（4.0.6）
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 1 # Increment this number if you need to re-download cached gems

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build CSS vendors (generate _sass/vendors/_bootstrap.scss)
        run: |
          npm install --no-fund --no-audit
          npm run build:css

      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4