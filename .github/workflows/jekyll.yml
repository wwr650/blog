# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write  # 👈 改为 write，以便更新文件
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 👈 需要完整的 Git 历史来获取修改时间

      # 👇 新增：更新文章的 last_modified_at
      - name: Update last_modified_at for posts
        run: |
          echo "Updating last_modified_at for all posts..."
          for file in _posts/*.md _posts/*.markdown; do
            if [ -f "$file" ]; then
              # 获取文件的最后 Git 修改时间（ISO 8601 格式）
              lastmod=$(git log -1 --format="%cd" --date=iso -- "$file" | sed 's/ /T/' | sed 's/+.*/+0800/')
              if [ -n "$lastmod" ]; then
                # 如果已有 last_modified_at 字段，更新它
                if grep -q "^last_modified_at:" "$file"; then
                  sed -i "s/^last_modified_at:.*/last_modified_at: $lastmod/" "$file"
                  echo "  ✅ Updated $file -> $lastmod"
                else
                  # 否则在 date 后面插入 last_modified_at
                  sed -i "/^date:/a last_modified_at: $lastmod" "$file"
                  echo "  ➕ Added last_modified_at to $file -> $lastmod"
                fi
              else
                echo "  ⚠️  No Git history for $file, skipping..."
              fi
            fi
          done

      # 👇 新增：提交更新后的文件（可选）
      - name: Commit updated last_modified_at (if changed)
        run: |
          if [[ -n $(git status _posts/ -s) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _posts/
            git commit -m "chore: auto-update last_modified_at [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "No changes to last_modified_at"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@8575951200e472d5f2d95c625da0c7bec8217c42 # v1.161.0
        with:
          ruby-version: '3.1' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4